<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A daily category puzzle from small hours." />
    <title>Daily Connections — small hours</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="wordmark" href="./index.html" aria-label="small hours home">small hours</a>
      <nav aria-label="Main navigation">
        <a href="./index.html#writing">articles</a>
        <a class="active" href="./games.html">games</a>
        <a href="./about.html">about</a>
        <a href="mailto:raghavmehra1406@gmail.com">say hi</a>
      </nav>
    </header>

    <main class="connections-page">
      <a class="back-link" href="./games.html">← games</a>
      <section class="connections-hero" aria-labelledby="connections-heading">
        <p class="eyebrow">DAILY GAME</p>
        <h1 id="connections-heading">Daily<br />Connections</h1>
        <p>Find four groups of four. Select four tiles, submit your guess, and try to solve it before the mistakes run out.</p>
      </section>

      <section class="connections-game" aria-label="Daily Connections puzzle">
        <div class="connections-status">
          <p id="connections-message">Make your first group.</p>
          <p>Mistakes left: <span id="mistakes-left">4</span></p>
        </div>

        <div id="solved-groups" class="solved-groups" aria-live="polite"></div>
        <div id="connections-board" class="connections-board" aria-label="Word tiles"></div>

        <div class="connections-actions">
          <button id="shuffle-btn" type="button">Shuffle</button>
          <button id="clear-btn" type="button">Clear</button>
          <button id="submit-btn" type="button">Submit</button>
        </div>

        <button id="share-btn" class="share-btn" type="button" hidden>Share result</button>
      </section>
    </main>

    <footer><span>© 2026 SMALL HOURS</span><span>THINKING, OUT LOUD</span></footer>
    <script src="./connections.js"></script>
  </body>
</html>
