<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A logo guessing game from small hours." />
    <title>Guess the Logo — small hours</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="wordmark" href="./index.html" aria-label="small hours home">small hours</a>
      <nav aria-label="Main navigation">
        <a href="./index.html#writing">articles</a>
        <a class="active" href="./games.html">games</a>
        <a href="./about.html">about</a>
        <a href="mailto:raghavmehra1406@gmail.com">say hi</a>
      </nav>
    </header>

    <main class="logo-page">
      <a class="back-link" href="./games.html">← games</a>
      <section class="logo-hero" aria-labelledby="logo-heading">
        <p class="eyebrow">DAILY GAME</p>
        <h1 id="logo-heading">Guess<br />the Logo</h1>
        <p>A visual guessing game. Reveal the mark piece by piece — fewer reveals means more points.</p>
      </section>

      <section class="logo-game" aria-label="Guess the Logo game">
        <div class="logo-status">
          <p id="logo-message">Guess the brand from the first reveal.</p>
          <p><span id="logo-round">1 / 4</span> · Score: <span id="logo-score">100</span></p>
        </div>

        <div class="logo-stage" aria-label="Partially hidden logo">
          <div id="logo-mask" class="logo-mask reveal-1">
            <div id="fake-logo" class="fake-logo" aria-hidden="true"></div>
          </div>
        </div>

        <div id="logo-options" class="logo-options" aria-label="Logo choices"></div>

        <div class="logo-actions">
          <button id="reveal-btn" type="button">Reveal more</button>
          <button id="next-logo-btn" type="button" hidden>Next logo</button>
          <button id="logo-reset-btn" type="button">Reset</button>
          <button id="logo-share-btn" type="button" hidden>Share result</button>
        </div>
      </section>
    </main>

    <footer><span>© 2026 SMALL HOURS</span><span>THINKING, OUT LOUD</span></footer>
    <script src="./logo-game.js"></script>
  </body>
</html>
