<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A mini crossword from small hours." />
    <title>Mini Crossword — small hours</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="wordmark" href="./index.html" aria-label="small hours home">small hours</a>
      <nav aria-label="Main navigation">
        <a href="./index.html#writing">articles</a>
        <a class="active" href="./games.html">games</a>
        <a href="./about.html">about</a>
        <a href="mailto:raghavmehra1406@gmail.com">say hi</a>
      </nav>
    </header>

    <main class="crossword-page">
      <a class="back-link" href="./games.html">← games</a>
      <section class="crossword-hero" aria-labelledby="crossword-heading">
        <p class="eyebrow">DAILY GAME</p>
        <h1 id="crossword-heading">Mini<br />Crossword</h1>
        <p>A small interlocking grid. Fill the clues, check your work, or reveal the answer if the puzzle bites back.</p>
      </section>

      <section class="crossword-game" aria-label="Mini Crossword game">
        <div class="crossword-status">
          <p id="crossword-message">Fill the grid.</p>
          <p><span id="crossword-filled">0</span> / 21 letters</p>
        </div>

        <div class="crossword-layout">
          <div id="crossword-grid" class="crossword-grid" aria-label="Crossword grid"></div>
          <div class="crossword-clues">
            <section>
              <h2>Across</h2>
              <ol id="across-clues"></ol>
            </section>
            <section>
              <h2>Down</h2>
              <ol id="down-clues"></ol>
            </section>
          </div>
        </div>

        <div class="crossword-actions">
          <button id="crossword-check" type="button">Check</button>
          <button id="crossword-reveal" type="button">Reveal</button>
          <button id="crossword-reset" type="button">Reset</button>
        </div>
      </section>
    </main>

    <footer><span>© 2026 SMALL HOURS</span><span>THINKING, OUT LOUD</span></footer>
    <script src="./crossword.js"></script>
  </body>
</html>
